name: Deploy Gymbot to Apps Script

on:
  push:
    branches:
      - main  # This triggers the deploy every time you push to main

env:
  # Silence warnings by forcing runner onto Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Clasp
        run: npm install -g @google/clasp

      - name: Create Authentication File
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Create .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.SCRIPT_ID }}","rootDir":"./src"}' > .clasp.json

      - name: Push to Google Apps Script
        run: clasp push --force
